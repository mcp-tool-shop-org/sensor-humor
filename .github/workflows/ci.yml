name: CI

on:
  push:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'package.json'
      - 'tsconfig.json'
      - '.github/workflows/ci.yml'
      - 'CHANGELOG.md'
      - '.npmignore'
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'package.json'
      - 'tsconfig.json'
      - '.github/workflows/ci.yml'
      - 'CHANGELOG.md'
      - '.npmignore'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # full history so TruffleHog has a stable scan range
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Production-tree dependency audit. The runtime tree pulls hono/express/etc.
      # transitively through @modelcontextprotocol/sdk's HTTP/SSE transport, which this
      # server never uses (stdio only); the critical-level gate still blocks any new,
      # genuinely reachable critical from landing in the shipped dependency tree.
      - name: Dependency audit (prod tree, critical gate)
        run: npm audit --omit=dev --audit-level=critical
      # Secret scan with TruffleHog OSS — verified findings only (gitleaks-action needs a
      # paid license on org repos; TruffleHog OSS is free).
      - name: Secret scan (TruffleHog OSS)
        uses: trufflesecurity/trufflehog@30d5bb91af1a771378349dbbb0c82129392acf70 # v3.95.6
        with:
          path: ./
          extra_args: --results=verified --only-verified
